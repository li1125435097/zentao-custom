<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申请账号 - 禅道管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
  <script>
    window.PAGE_SUBTITLE = '填写姓名、岗位、性别提交账号申请，管理员审核后将创建禅道账号。';
  </script>
</head>
<body>
  <div class="app-shell d-flex">
    <aside id="sidebar" class="sidebar"></aside>

    <div class="main-content">
      <header class="page-header px-4 py-3">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <h1 id="pageTitle" class="h4 mb-1">申请账号</h1>
            <p id="pageSubtitle" class="text-muted mb-0 small"></p>
          </div>
          <span class="badge text-bg-info">内部用户 / 申请账号</span>
        </div>
      </header>

      <main class="container-fluid p-4">
        <div class="row justify-content-center">
          <div class="col-xl-8 col-lg-10">
            <div class="card content-card">
              <div class="card-body p-4">
                <form id="applyForm" novalidate>
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="name" class="form-label">姓名</label>
                      <input id="name" name="name" type="text" class="form-control" placeholder="例如：张三" required autocomplete="name">
                    </div>

                    <div class="col-md-6">
                      <label for="gender" class="form-label">性别</label>
                      <select id="gender" name="gender" class="form-select" required>
                        <option value="男" selected>男</option>
                        <option value="女">女</option>
                      </select>
                    </div>

                    <div class="col-12">
                      <label for="position" class="form-label">岗位</label>
                      <select id="position" name="position" class="form-select" required>
                        <option value="">请选择岗位</option>
                      </select>
                    </div>
                  </div>

                  <div class="alert alert-light border mt-4 mb-4">
                    <div class="fw-semibold mb-2">说明</div>
                    <ul class="mb-0 small text-muted">
                      <li>提交后申请将进入待获取列表，状态为「申请中」</li>
                      <li>管理员审核通过后将自动创建禅道账号</li>
                      <li>账号创建完成后，您可在「用户获取」页面获取登录信息</li>
                    </ul>
                  </div>

                  <button id="submitBtn" type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-send me-1"></i>申请禅道账号
                  </button>
                </form>

                <div id="status" class="alert mt-4 d-none" role="alert"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/models/positions.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/internal/apply-account.js"></script>
  <script>
    initLayout({ section: 'internal', page: 'apply-account', title: '申请账号' });
  </script>
</body>
</html>
