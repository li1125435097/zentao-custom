<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户获取 - 禅道管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
  <script>
    window.PAGE_SUBTITLE = '输入姓名从待获取用户信息中获取账号详情，每条信息仅可获取一次。';
  </script>
</head>
<body>
  <div class="app-shell d-flex">
    <aside id="sidebar" class="sidebar"></aside>

    <div class="main-content">
      <header class="page-header px-4 py-3">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <h1 id="pageTitle" class="h4 mb-1">用户获取</h1>
            <p id="pageSubtitle" class="text-muted mb-0 small"></p>
          </div>
          <span class="badge text-bg-info">内部用户 / 用户获取</span>
        </div>
      </header>

      <main class="container-fluid p-4">
        <div class="row justify-content-center">
          <div class="col-xl-8 col-lg-10">
            <div class="card content-card">
              <div class="card-body p-4">
                <form id="fetchForm" novalidate>
                  <div class="mb-3">
                    <label for="nameInput" class="form-label">姓名</label>
                    <input id="nameInput" type="text" class="form-control" placeholder="输入待获取用户的姓名" required autocomplete="name">
                  </div>
                  <button id="fetchBtn" type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-download me-1"></i>获取用户信息
                  </button>
                </form>

                <div id="status" class="alert mt-4 d-none" role="alert"></div>

                <div id="reApplyBox" class="d-none mt-2">
                  <button id="reApplyBtn" type="button" class="btn btn-outline-warning text-dark">
                    <i class="bi bi-arrow-repeat me-1"></i>申请变更密码重新获取账号
                  </button>
                </div>

                <div id="resultBox" class="d-none mt-4">
                  <div class="alert alert-success">
                    <i class="bi bi-check-circle me-1"></i>获取成功，该用户信息已从待获取列表中标记为已获取。
                  </div>
                  <dl class="row mb-0">
                    <dt class="col-sm-3">网址</dt>
                    <dd class="col-sm-9"><a id="resultUrl" href="#" target="_blank" rel="noopener noreferrer"></a></dd>

                    <dt class="col-sm-3">账号</dt>
                    <dd class="col-sm-9"><code id="resultAccount"></code></dd>

                    <dt class="col-sm-3">密码</dt>
                    <dd class="col-sm-9"><code id="resultPassword"></code></dd>

                    <dt class="col-sm-3">姓名</dt>
                    <dd class="col-sm-9" id="resultName"></dd>

                    <dt class="col-sm-3">岗位</dt>
                    <dd class="col-sm-9" id="resultPosition"></dd>

                    <dt class="col-sm-3">部门</dt>
                    <dd class="col-sm-9" id="resultDept"></dd>
                  </dl>
                  <button type="button" id="copyAllBtn" class="btn btn-outline-primary mt-3">
                    <i class="bi bi-clipboard me-1"></i>复制全部信息
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/internal/fetch-user.js"></script>
  <script>
    initLayout({ section: 'internal', page: 'fetch-user', title: '用户获取' });
  </script>
</body>
</html>
