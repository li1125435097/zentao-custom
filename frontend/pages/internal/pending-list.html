<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 - 禅道管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
  <script>
    window.PAGE_SUBTITLE = '查看账号管理列表，按时间范围筛选并查看获取状态。';
  </script>
</head>
<body>
  <div class="app-shell d-flex">
    <aside id="sidebar" class="sidebar"></aside>

    <div class="main-content">
      <header class="page-header px-4 py-3">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <h1 id="pageTitle" class="h4 mb-1">账号管理</h1>
            <p id="pageSubtitle" class="text-muted mb-0 small"></p>
          </div>
          <span class="badge text-bg-info">内部用户 / 账号管理</span>
        </div>
      </header>

      <main class="container-fluid p-4">
        <div class="card content-card">
          <div class="card-body p-4">
            <div class="d-flex flex-wrap align-items-center gap-3 mb-3">
              <div class="btn-group" role="group" aria-label="时间范围">
                <input type="radio" class="btn-check" name="rangeFilter" id="range2days" value="2days" checked>
                <label class="btn btn-outline-primary btn-sm" for="range2days">两天内</label>

                <input type="radio" class="btn-check" name="rangeFilter" id="rangeWeek" value="week">
                <label class="btn btn-outline-primary btn-sm" for="rangeWeek">一周内</label>

                <input type="radio" class="btn-check" name="rangeFilter" id="rangeAll" value="all">
                <label class="btn btn-outline-primary btn-sm" for="rangeAll">全部</label>
              </div>

              <button id="refreshBtn" type="button" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-clockwise me-1"></i>刷新
              </button>

              <small id="summaryInfo" class="text-muted ms-auto"></small>
            </div>

            <div id="status" class="alert d-none" role="alert"></div>

            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th scope="col">姓名</th>
                    <th scope="col">岗位</th>
                    <th scope="col">部门</th>
                    <th scope="col">性别</th>
                    <th scope="col">账号</th>
                    <th scope="col">状态</th>
                    <th scope="col">创建时间</th>
                    <th scope="col">获取时间</th>
                    <th scope="col">操作</th>
                  </tr>
                </thead>
                <tbody id="pendingTableBody">
                  <tr>
                    <td colspan="9" class="text-center text-muted py-4">加载中...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="confirmProcessModal" tabindex="-1" aria-labelledby="confirmProcessModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmProcessModalLabel">确认处理重新获取申请</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body">
          <p class="mb-2">将先重置该用户密码，再把账号管理记录恢复为未获取状态，用户即可重新获取账号信息。</p>
          <dl class="row mb-0 small">
            <dt class="col-sm-3">账号</dt>
            <dd class="col-sm-9"><code id="confirmAccount"></code></dd>
            <dt class="col-sm-3">姓名</dt>
            <dd class="col-sm-9" id="confirmRealname"></dd>
          </dl>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" id="confirmProcessBtn" class="btn btn-warning text-dark">
            <i class="bi bi-key me-1"></i>确认处理
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="resultModal" tabindex="-1" aria-labelledby="resultModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success-subtle">
          <h5 class="modal-title text-success-emphasis" id="resultModalLabel">
            <i class="bi bi-check-circle me-1"></i>处理成功
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body">
          <dl class="row mb-0">
            <dt class="col-sm-3">账号</dt>
            <dd class="col-sm-9"><code id="resultAccount"></code></dd>
            <dt class="col-sm-3">姓名</dt>
            <dd class="col-sm-9" id="resultRealname"></dd>
            <dt class="col-sm-3">新密码</dt>
            <dd class="col-sm-9">
              <code id="resultPassword" class="user-select-all"></code>
            </dd>
          </dl>
          <div class="alert alert-warning mt-3 mb-0 small">
            密码已重置，账号管理记录已恢复。用户重新获取后将看到新密码。
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="copyPasswordBtn" class="btn btn-primary">
            <i class="bi bi-clipboard me-1"></i>复制密码
          </button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/internal/pending-list.js"></script>
  <script>
    initLayout({ section: 'internal', page: 'pending-list', title: '账号管理' });
  </script>
</body>
</html>
