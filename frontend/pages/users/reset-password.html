<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - 禅道管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
  <script>
    window.PAGE_SUBTITLE = '查看禅道用户列表，支持按账号或姓名搜索，可为指定用户重置密码（系统随机生成新密码）。';
  </script>
</head>
<body>
  <div class="app-shell d-flex">
    <aside id="sidebar" class="sidebar"></aside>

    <div class="main-content">
      <header class="page-header px-4 py-3">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <h1 id="pageTitle" class="h4 mb-1">修改密码</h1>
            <p id="pageSubtitle" class="text-muted mb-0 small"></p>
          </div>
          <span class="badge text-bg-warning text-dark">用户管理 / 修改密码</span>
        </div>
      </header>

      <main class="container-fluid p-4">
        <div class="card content-card">
          <div class="card-body p-4">
            <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
              <div class="input-group" style="max-width: 320px;">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input id="searchInput" type="search" class="form-control" placeholder="搜索账号或姓名">
              </div>
              <button id="searchBtn" type="button" class="btn btn-outline-primary">
                <i class="bi bi-search me-1"></i>搜索
              </button>
              <button id="refreshBtn" type="button" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-clockwise me-1"></i>刷新
              </button>
            </div>

            <div id="status" class="alert d-none" role="alert"></div>

            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th scope="col">ID</th>
                    <th scope="col">账号</th>
                    <th scope="col">姓名</th>
                    <th scope="col">角色</th>
                    <th scope="col">部门</th>
                    <th scope="col">性别</th>
                    <th scope="col" class="text-end">操作</th>
                  </tr>
                </thead>
                <tbody id="userTableBody">
                  <tr>
                    <td colspan="7" class="text-center text-muted py-4">加载中...</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mt-3">
              <small id="pageInfo" class="text-muted"></small>
              <div class="btn-group">
                <button id="prevPageBtn" type="button" class="btn btn-outline-secondary btn-sm" disabled>上一页</button>
                <button id="nextPageBtn" type="button" class="btn btn-outline-secondary btn-sm" disabled>下一页</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="confirmResetModal" tabindex="-1" aria-labelledby="confirmResetModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmResetModalLabel">确认重置密码</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body">
          <p class="mb-2">确定要为以下用户重置密码吗？系统将随机生成 12 位新密码，旧密码将立即失效。</p>
          <dl class="row mb-0 small">
            <dt class="col-sm-3">账号</dt>
            <dd class="col-sm-9"><code id="confirmAccount"></code></dd>
            <dt class="col-sm-3">姓名</dt>
            <dd class="col-sm-9" id="confirmRealname"></dd>
          </dl>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" id="confirmResetBtn" class="btn btn-warning text-dark">
            <i class="bi bi-key me-1"></i>确认重置
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="resultModal" tabindex="-1" aria-labelledby="resultModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success-subtle">
          <h5 class="modal-title text-success-emphasis" id="resultModalLabel">
            <i class="bi bi-check-circle me-1"></i>密码重置成功
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body">
          <dl class="row mb-0">
            <dt class="col-sm-3">账号</dt>
            <dd class="col-sm-9"><code id="resultAccount"></code></dd>
            <dt class="col-sm-3">姓名</dt>
            <dd class="col-sm-9" id="resultRealname"></dd>
            <dt class="col-sm-3">新密码</dt>
            <dd class="col-sm-9">
              <code id="resultPassword" class="user-select-all"></code>
            </dd>
          </dl>
          <div class="alert alert-warning mt-3 mb-0 small">
            请妥善保存新密码，并通知用户尽快登录修改。
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="copyPasswordBtn" class="btn btn-primary">
            <i class="bi bi-clipboard me-1"></i>复制密码
          </button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/clipboard.js"></script>
  <script src="/assets/js/users/reset-password.js"></script>
  <script>
    initLayout({ section: 'users', page: 'reset-password', title: '修改密码' });
  </script>
</body>
</html>
